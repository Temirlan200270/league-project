<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список чемпионов</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <a href="/code.html" class="back-to-home btn">На главную</a>

    <header>
        <nav role="navigation">
          <ul>
            <li><a href="/game description.html">Описание игры</a></li>
            <li><a href="/champions.html">Чемпионы</a></li>
            <li><a href="/news.html">Новости</a></li>
            <li><a href="/last update.html">Описание последнего обновления</a></li>
            <li><a href="/account.html">Личный кабинет</a></li>
          </ul>
        </nav>
    </header>

    <main>
        <h2>Список чемпионов</h2>

        <div class="filters">
            <!-- Фильтры ролей (чекбоксы) -->
            <fieldset class="role-filters">
                <legend>Роль:</legend>
                <label for="role-all"><input type="checkbox" id="role-all" value="all" checked>Все</label>
                <label for="role-fighter"><input type="checkbox" id="role-fighter" value="Fighter">Боец</label>
                <label for="role-tank"><input type="checkbox" id="role-tank" value="Tank">Танк</label>
                <label for="role-mage"><input type="checkbox" id="role-mage" value="Mage">Маг</label>
                <label for="role-assassin"><input type="checkbox" id="role-assassin" value="Assassin">Убийца</label>
                <label for="role-support"><input type="checkbox" id="role-support" value="Support">Поддержка</label>
                <label for="role-marksman"><input type="checkbox" id="role-marksman" value="Marksman">Стрелок</label>
            </fieldset>

            <!-- Фильтр сложности (select) -->
            <label for="difficulty-filter">Сложность:</label>
            <select id="difficulty-filter">
                <option value="all">Все</option>
                <option value="Low">Низкая</option>
                <option value="Moderate">Средняя</option>
                <option value="High">Высокая</option>
            </select>

            <!-- Сортировка (select) -->
            <label for="sort-filter">Сортировать:</label>
            <select id="sort-filter">
                <option value="name-asc">По имени (А-Я)</option>
                <option value="name-desc">По имени (Я-А)</option>
                <option value="difficulty-asc">По сложности (от низкой к высокой)</option>
                <option value="difficulty-desc">По сложности (от высокой к низкой)</option>
            </select>


            <!-- Поиск -->
            <label for="search-input">Поиск:</label>
            <input type="text" id="search-input" placeholder="Поиск..." role="searchbox" aria-label="Поиск чемпионов">

            <!-- Кнопка сброса фильтров -->
            <button id="reset-filters" class="btn">Сбросить фильтры</button>
        </div>
        <div class="section-wrapper" style="max-width: var(--content-max-width);">
            <ul class="champions-list" id="champions-list" aria-live="polite">  <!--  Добавлено aria-live -->
              <li id="loading-message" style="display: none;">Загрузка...</li>
                <!-- Динамически заполняемый список -->
            </ul>
            <p id="no-champions-message" style="display: none;">Чемпионы не найдены.</p>
            <p class="error-message" style="display: none; color: red;"></p>
            <div class="pagination">
              <button class="btn pagination-button" id="prev-page-button" aria-label="Предыдущая страница">< Назад</button>
              <span class="pagination-info">Страница 1 из 1</span>
              <button class="btn pagination-button" id="next-page-button" aria-label="Следующая страница">Вперед ></button>
            </div>
         </div>
    </main>

    <footer>
        <p>© 2024 League of Legends</p>
    </footer>
    <script src="/script.js" type="module"></script>
    <script src="/champions-page.js" type="module"></script>

</body>
</html>
